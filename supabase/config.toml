
[functions.transcribe]
enabled = true
verify_jwt = true
import_map = "./functions/transcribe/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/transcribe/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/transcribe/*.html" ]

[functions.extract_prayer_themes]
enabled = true
verify_jwt = true
entrypoint = "./functions/extract_prayer_themes/index.ts"

[functions.send_reflection_notifications]
enabled = true
verify_jwt = false
entrypoint = "./functions/send_reflection_notifications/index.ts"

[functions.paywall-exit]
enabled = true
verify_jwt = false
entrypoint = "./functions/paywall-exit/index.ts"

[functions.send-paywall-email]
enabled = true
verify_jwt = false
entrypoint = "./functions/send-paywall-email/index.ts"
